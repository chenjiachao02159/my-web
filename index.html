<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoVaCc - AI 创作工作站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { mi: { orange: '#FF6700', hover: '#E55D00', light: '#FFF0E5' } },
                    boxShadow: { 'mi-card': '0 8px 40px rgba(0, 0, 0, 0.06)', 'mi-float': '0 12px 48px rgba(0, 0, 0, 0.08)', 'glow': '0 0 20px rgba(255, 103, 0, 0.15)' }
                }
            }
        }
    </script>
    <style>
        body { font-family: "MiSans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #F5F5F7; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        html { scroll-behavior: smooth; }
        
        .grid-container { display: grid; gap: 1.5rem; transition: all 0.3s ease; }
        .grid-item { position: relative; transform: translateZ(0); display: flex; flex-direction: column; }
        .grid-size-sm { grid-template-columns: repeat(2, minmax(0, 1fr)); } @media(min-width: 768px){ .grid-size-sm { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        .grid-size-md { grid-template-columns: repeat(1, minmax(0, 1fr)); } @media(min-width: 768px){ .grid-size-md { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
        .grid-size-lg { grid-template-columns: repeat(1, minmax(0, 1fr)); } @media(min-width: 768px){ .grid-size-lg { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
        
        .chat-container { max-w-4xl; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem; padding-bottom: 2rem; }
        .chat-bubble { max-width: 85%; padding: 1rem 1.25rem; border-radius: 1.5rem; line-height: 1.6; font-size: 0.95rem; }
        .chat-user { align-self: flex-end; background-color: #f3f4f6; color: #111827; border-bottom-right-radius: 0.25rem; }
        .chat-ai { align-self: flex-start; background-color: transparent; color: #1f2937; }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 103, 0, 0.4); transform: scale(1); }
            50% { box-shadow: 0 0 20px 0 rgba(255, 103, 0, 0.1); transform: scale(1.02); }
        }
        .animate-pulse-glow { animation: pulse-glow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .radial-mask {
            mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 65%);
            -webkit-mask-image: radial-gradient(circle at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 65%);
        }
        @keyframes float-up-down {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .animate-float-slow { animation: float-up-down 4s ease-in-out infinite; }
    </style>
</head>
<body class="text-gray-900 h-screen flex flex-col overflow-hidden selection:bg-mi-light selection:text-mi-orange">

    <!-- 图片放大查看器 (Lightbox) -->
    <div id="lightboxModal" class="fixed inset-0 z-[300] hidden items-center justify-center bg-black/90 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <button id="closeLightboxBtn" class="absolute top-6 right-6 text-white/60 hover:text-white p-2 transition-colors focus:outline-none">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        <img id="lightboxImg" src="" class="max-h-[90vh] max-w-[90vw] object-contain rounded-lg shadow-2xl transform scale-95 transition-transform duration-300">
    </div>

    <!-- 多选批量操作栏 -->
    <div id="batchActionBar" class="fixed bottom-[140px] left-1/2 -translate-x-1/2 bg-gray-900/95 backdrop-blur-xl border border-gray-700/50 text-white px-6 py-3.5 rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.4)] z-[100] flex items-center gap-5 translate-y-20 opacity-0 pointer-events-none transition-all duration-400 ease-[cubic-bezier(0.23,1,0.32,1)]">
        <span class="text-[13px] font-bold tracking-wide" id="batchCount">已选择 0 项</span>
        <div class="w-px h-4 bg-gray-700"></div>
        <button id="batchDownloadBtn" class="text-[13px] font-medium hover:text-mi-orange transition-colors flex items-center gap-1.5 focus:outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>批量打包
        </button>
        <button id="batchDeleteBtn" class="text-[13px] font-medium text-red-400 hover:text-red-300 transition-colors flex items-center gap-1.5 focus:outline-none">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg><span id="batchDeleteText">批量删除</span>
        </button>
        <button id="batchCancelBtn" class="text-[13px] text-gray-400 hover:text-white transition-colors ml-1 focus:outline-none">取消</button>
    </div>

    <!-- 首次访问新手引导 -->
    <div id="onboardingOverlay" class="fixed inset-0 z-[200] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-md transition-opacity opacity-0" id="obBackdrop"></div>
        <div class="relative bg-white/95 backdrop-blur-2xl w-full max-w-[420px] rounded-[36px] shadow-[0_24px_80px_rgba(0,0,0,0.2)] overflow-hidden transform scale-95 opacity-0 transition-all duration-500 border border-white/60" id="onboardingCard">
            <div class="h-[240px] w-full flex items-center justify-center relative overflow-hidden bg-gray-50/50" id="obGraphicContainer">
                <div id="obIllustration" class="relative w-full h-full z-10 transition-all duration-500 transform translate-y-4 opacity-0 flex items-center justify-center"></div>
            </div>
            <div class="px-8 pt-6 pb-6">
                <div class="flex justify-center gap-2 mb-6" id="obDots"></div>
                <h3 class="text-[20px] font-bold text-gray-900 mb-3 tracking-tight text-center" id="obTitle"></h3>
                <p class="text-[14px] text-gray-500 leading-relaxed text-center min-h-[66px]" id="obDesc"></p>
            </div>
            <div class="px-8 pb-8 flex items-center justify-between">
                <button id="obSkipBtn" class="text-[14px] font-medium text-gray-400 hover:text-gray-700 transition-colors focus:outline-none">跳过引导</button>
                <div class="flex items-center gap-3">
                    <button id="obPrevBtn" class="w-11 h-11 rounded-full bg-gray-100 flex items-center justify-center text-gray-600 hover:bg-gray-200 transition-colors disabled:opacity-30 disabled:cursor-not-allowed focus:outline-none">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="obNextBtn" class="h-11 px-6 rounded-full bg-gray-900 text-white text-[14px] font-bold hover:bg-mi-orange transition-all duration-300 flex items-center gap-1.5 shadow-md active:scale-95 focus:outline-none">
                        <span id="obNextText">下一页</span>
                        <svg id="obNextIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 全局设置 -->
    <div id="settingsModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/30 backdrop-blur-md transition-opacity modal-backdrop"></div>
        <div class="relative bg-white/95 backdrop-blur-xl w-full max-w-sm rounded-[32px] shadow-mi-float border border-white/50 z-10">
            <div class="px-7 py-6 flex justify-between items-center border-b border-gray-100/50">
                <h2 class="text-lg font-medium tracking-wide">全局设置</h2>
                <button class="close-modal-btn text-gray-400 hover:text-gray-800 bg-gray-100 hover:bg-gray-200 p-2 rounded-full transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="px-7 py-5 space-y-4">
                <div>
                    <label class="block text-[13px] font-medium text-gray-500 mb-2 pl-1">接口地址</label>
                    <input type="text" id="apiUrl" value="https://api.bltcy.ai" class="w-full px-4 py-2.5 bg-gray-50 border-transparent rounded-2xl text-sm focus:bg-white focus:border-mi-orange/30 focus:ring-4 focus:ring-mi-orange/10 outline-none transition-all">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-2 px-1">
                        <label class="block text-[13px] font-medium text-gray-500">主力 API Key</label>
                        <button id="syncModelsBtn" class="text-[12px] font-medium text-mi-orange hover:text-mi-hover flex items-center gap-1">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>同步 OpenAI 模型
                        </button>
                    </div>
                    <input type="password" id="apiKey" placeholder="输入您的 API 凭证" class="w-full px-4 py-2.5 bg-gray-50 border-transparent rounded-2xl text-sm focus:bg-white focus:border-mi-orange/30 focus:ring-4 focus:ring-mi-orange/10 outline-none transition-all">
                </div>
                
                <!-- 模块 3 优化：将 Gemini API Key 的配置收拢至全局设置，杜绝硬编码 -->
                <div class="pt-2 border-t border-gray-100/60 mt-2">
                    <label class="block text-[13px] font-medium text-gray-500 mb-2 pl-1">Gemini API Key <span class="text-[10px] text-gray-400 font-normal ml-1">(专用于魔法扩写)</span></label>
                    <input type="password" id="geminiApiKey" placeholder="输入 Gemini 官方凭证" class="w-full px-4 py-2.5 bg-gray-50 border-transparent rounded-2xl text-sm focus:bg-white focus:border-mi-orange/30 focus:ring-4 focus:ring-mi-orange/10 outline-none transition-all">
                </div>

                <div class="pt-2">
                    <label class="block text-[13px] font-medium text-gray-500 mb-2 pl-1">图像返回格式</label>
                    <div class="flex bg-gray-50 p-1 rounded-2xl relative">
                        <input type="hidden" id="imageFormatSetting" value="auto">
                        <button class="format-btn flex-1 py-2 text-[12px] font-medium rounded-xl bg-white shadow-sm text-gray-900 transition-all" data-value="auto">自动 (优先URL)</button>
                        <button class="format-btn flex-1 py-2 text-[12px] font-medium rounded-xl text-gray-500 hover:text-gray-700 transition-all" data-value="b64_json">仅 Base64</button>
                    </div>
                </div>
                <div class="pt-2">
                    <label class="block text-[13px] font-medium text-gray-500 mb-2 pl-1">画板排版大小</label>
                    <div class="flex bg-gray-50 p-1 rounded-2xl">
                        <button class="grid-size-btn flex-1 py-2 text-sm font-medium rounded-xl bg-white shadow-sm text-gray-900" data-size="grid-size-sm">小</button>
                        <button class="grid-size-btn flex-1 py-2 text-sm font-medium rounded-xl text-gray-500" data-size="grid-size-md">中</button>
                        <button class="grid-size-btn flex-1 py-2 text-sm font-medium rounded-xl text-gray-500" data-size="grid-size-lg">大</button>
                    </div>
                </div>
                <div class="pt-2 border-t border-gray-100/60 mt-4">
                    <button id="clearStorageBtn" class="w-full py-2.5 text-[13px] font-medium text-red-500 hover:text-red-600 bg-red-50 hover:bg-red-100 rounded-2xl transition-all duration-300 flex items-center justify-center gap-2 focus:outline-none">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        <span>清空本地对话与画板记录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 模型选择器 -->
    <div id="modelModal" class="fixed inset-0 z-[60] hidden flex items-end md:items-center justify-center p-0 md:p-4">
        <div class="absolute inset-0 bg-black/20 backdrop-blur-sm modal-backdrop"></div>
        <div class="relative bg-white w-full max-w-4xl rounded-t-[32px] md:rounded-[32px] shadow-mi-float h-[85vh] flex flex-col z-10 overflow-hidden">
            <div class="flex justify-end items-center px-6 pt-5 pb-0">
                <button class="close-modal-btn p-2 bg-gray-100 hover:bg-gray-200 transition-colors rounded-full focus:outline-none"><svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
            <div class="flex gap-6 px-6 border-b border-gray-100 mt-2">
                <button class="model-tab-btn active pb-3 text-[15px] font-medium border-b-2 border-mi-orange text-mi-orange" data-type="text">文本对话</button>
                <button class="model-tab-btn pb-3 text-[15px] font-medium border-b-2 border-transparent text-gray-500" data-type="image">图片生成</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6 bg-gray-50/50" id="modelListContainer"></div>
        </div>
    </div>

    <!-- 导航 -->
    <header class="bg-transparent px-6 pt-6 pb-2 flex justify-between items-center shrink-0 w-full relative max-w-[1400px] mx-auto z-10">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-[16px] flex items-center justify-center bg-gradient-to-br from-gray-900 to-black shadow-lg">
                <svg class="w-6 h-6 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/><circle cx="12" cy="12" r="2" fill="#FF6700" stroke="none"/></svg>
            </div>
            <h1 class="text-[22px] font-bold tracking-tight">NoVaCc</h1>
        </div>
        <button id="openSettingsBtn" class="p-2.5 text-gray-600 bg-white shadow-sm hover:text-mi-orange rounded-full"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg></button>
    </header>

    <!-- 工作区 -->
    <main class="flex-1 overflow-y-auto px-4 pb-64 pt-4 md:px-8 relative max-w-[1600px] mx-auto w-full" id="mainWorkspace">
        <div id="statusMessage" class="hidden fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 bg-white shadow-lg rounded-full border border-gray-100 font-medium transition-all"></div>
        <div id="flowView" class="w-full min-h-full relative flex flex-col hidden">
            <div id="emptyState" class="fixed inset-0 m-auto flex flex-col items-center justify-center pointer-events-none opacity-50 radial-mask h-fit">
                <div class="w-20 h-20 bg-white shadow-mi-card rounded-[24px] flex items-center justify-center border border-white animate-pulse-glow"><svg class="w-10 h-10 text-mi-orange/80" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg></div>
                <h3 class="text-[20px] font-bold mt-4 tracking-[0.2em]">灵感画布</h3>
            </div>
            <!-- Grid 容器 -->
            <div id="resultGrid" class="grid-container grid-size-sm w-full pb-10 min-h-[50vh] relative z-10"></div>
        </div>
        <div id="chatView" class="w-full min-h-full relative z-10"><div id="chatContainer" class="chat-container"></div></div>
    </main>

    <!-- 控制台 -->
    <footer class="fixed bottom-0 left-0 right-0 z-50 pb-6 px-4 pointer-events-none">
        <div class="max-w-4xl mx-auto pointer-events-auto bg-white/85 backdrop-blur-2xl border border-white/60 p-4 rounded-[32px] shadow-mi-float">
            <div class="flex items-center flex-wrap gap-3 mb-3">
                <button id="openModelPickerBtn" class="flex items-center gap-1.5 bg-gray-100 py-2 pl-3 pr-4 rounded-full text-[13px] font-medium shadow-sm hover:bg-gray-200 transition-colors">
                    <span id="currentModelIcon" class="w-5 h-5 flex items-center justify-center"></span><span id="currentModelName" class="ml-1 font-semibold">GPT-5.4 Pro</span>
                    <span class="text-[10px] uppercase font-bold bg-gray-200 text-gray-500 px-1.5 py-0.5 rounded ml-1" id="currentModelTypeBadge">文本</span>
                    <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </button>
                <div id="dynamicParamsContainer" class="flex items-center gap-3 hidden">
                    <!-- 动态尺寸下拉框 -->
                    <div class="relative custom-dropdown" id="sizeDropdownContainer">
                        <input type="hidden" id="dynamicSize" value="">
                        <button type="button" class="dropdown-trigger flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 py-2 px-4 rounded-full text-[13px] transition-colors"><span class="dropdown-label font-medium">尺寸</span><svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                        <div class="dropdown-menu absolute bottom-full left-0 hidden mb-2 bg-white/95 backdrop-blur-md border border-gray-100 rounded-[20px] shadow-mi-float p-1.5 min-w-[150px] z-[70]" id="sizeDropdownMenu"></div>
                    </div>
                    <!-- 动态数量下拉框 -->
                    <div class="relative custom-dropdown" id="countDropdownContainer">
                        <input type="hidden" id="dynamicCount" value="1">
                        <button type="button" class="dropdown-trigger flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 py-2 px-4 rounded-full text-[13px] transition-colors"><span class="dropdown-label font-medium">1 张</span><svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg></button>
                        <div class="dropdown-menu absolute bottom-full left-0 hidden mb-2 bg-white/95 backdrop-blur-md border border-gray-100 rounded-[20px] shadow-mi-float p-1.5 min-w-[100px] z-[70]" id="countDropdownMenu"></div>
                    </div>
                </div>
            </div>
            
            <div id="inputDropZone" class="relative flex flex-col bg-white border border-gray-200 rounded-[28px] shadow-sm overflow-hidden group/input">
                <div id="dropOverlay" class="absolute inset-0 bg-mi-light/95 z-30 hidden items-center justify-center backdrop-blur-sm"><p class="text-mi-orange font-medium">释放以上传参考图</p></div>
                <div id="imagePreviewContainer" class="hidden px-4 pt-3 pb-0 flex gap-3 overflow-x-auto no-scrollbar"></div>
                <div class="relative flex items-end w-full pb-1.5 pt-1.5">
                    <label class="shrink-0 mb-1 ml-2 flex items-center justify-center w-10 h-10 text-gray-400 hover:text-gray-700 cursor-pointer transition-colors">
                        <input type="file" id="referenceImage" accept=".png, .jpeg, .jpg, .webp, .gif" multiple class="hidden">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </label>
                    <textarea id="promptText" rows="1" placeholder="发送消息，或拖拽图片..." class="flex-1 bg-transparent border-0 pl-2 pr-[90px] py-3 text-[15px] leading-relaxed resize-none outline-none max-h-[100px] overflow-y-auto no-scrollbar"></textarea>
                    <div class="absolute right-[86px] bottom-2.5 top-2.5 w-10 bg-gradient-to-r from-transparent to-white pointer-events-none"></div>
                    
                    <div class="absolute right-[50px] bottom-2">
                        <button id="enhanceBtn" class="flex items-center justify-center w-[36px] h-[36px] bg-white text-gray-400 border border-transparent rounded-full hover:text-mi-orange hover:bg-mi-light hover:border-mi-orange/30 transition-all duration-300" title="✨ 使用 Gemini 大模型智能润色与扩写提示词">

        // 模块 3 优化：防范 XSS 的核心转义工具
        const SecureUtils = {
            escapeHTML(str) {
                if (!str) return '';
                return str.toString().replace(/[&<>'"]/g, tag => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
                }[tag]));
            }
        };

        const IndexedDBHelper = {
            db: null,
            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open('NoVaCcDB', 1);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('FlowHistory')) {
                            db.createObjectStore('FlowHistory', { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (e) => { this.db = e.target.result; resolve(); };
                    request.onerror = (e) => reject(e.target.error);
                });
            },
            save(item) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction('FlowHistory', 'readwrite');
                    const store = tx.objectStore('FlowHistory');
                    store.put(item).onsuccess = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            },
            remove(id) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction('FlowHistory', 'readwrite');
                    const store = tx.objectStore('FlowHistory');
                    store.delete(id).onsuccess = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            },
            getAll() {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve([]);
                    const tx = this.db.transaction('FlowHistory', 'readonly');
                    const store = tx.objectStore('FlowHistory');
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },
            clear() {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction('FlowHistory', 'readwrite');
                    const store = tx.objectStore('FlowHistory');
                    store.clear().onsuccess = resolve;
                    tx.onerror = () => reject(tx.error);
                });
            }
        };

        function updateCardSelectionUI(cardId, isSelected) {
            const card = document.getElementById(cardId);
            if (!card) return;
            const checkboxBtn = card.querySelector('.select-checkbox');
            const checkIcon = checkboxBtn.querySelector('svg');
            if (isSelected) {
                checkboxBtn.classList.add('bg-mi-orange', 'border-mi-orange', 'opacity-100');
                checkboxBtn.classList.remove('border-transparent', 'bg-black/20');
                checkIcon.classList.remove('scale-0');
                checkIcon.classList.add('scale-100');
            } else {
                checkboxBtn.classList.remove('bg-mi-orange', 'border-mi-orange', 'opacity-100');
                checkboxBtn.classList.add('border-transparent', 'bg-black/20');
                checkIcon.classList.remove('scale-100');
                checkIcon.classList.add('scale-0');
            }
        }

        function clearSelection() {
            selectedFlowCards.forEach(id => updateCardSelectionUI(id, false));
            selectedFlowCards.clear();
            lastSelectedCardId = null;
            batchDeleteClicks = 0;
            const delBtnText = document.getElementById('batchDeleteText');
            if (delBtnText) delBtnText.textContent = "批量删除";
            updateBatchActionBar();
        }

        function handleSelect(e, cardId) {
            if (e.shiftKey && lastSelectedCardId) {
                const allIds = Array.from(document.querySelectorAll('#resultGrid .grid-item')).map(c => c.id);
                const startIdx = allIds.indexOf(lastSelectedCardId);
                const endIdx = allIds.indexOf(cardId);
                if (startIdx !== -1 && endIdx !== -1) {
                    const min = Math.min(startIdx, endIdx);
                    const max = Math.max(startIdx, endIdx);
                    for (let i = min; i <= max; i++) {
                        selectedFlowCards.add(allIds[i]);
                        updateCardSelectionUI(allIds[i], true);
                    }
                }
            } else {
                if (selectedFlowCards.has(cardId)) {
                    selectedFlowCards.delete(cardId);
                    updateCardSelectionUI(cardId, false);
                } else {
                    selectedFlowCards.add(cardId);
                    updateCardSelectionUI(cardId, true);
                }
            }
            lastSelectedCardId = cardId;
            updateBatchActionBar();
        }

        function addChatBubble(text, isUser = false, extraClass = '', save = false, isSafeHtml = false) { 
            const chatContainer = document.getElementById('chatContainer'); 
            const bubbleWrap = document.createElement('div');
            bubbleWrap.className = `flex w-full ${isUser ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div'); 
            bubble.className = `chat-bubble ${isUser ? 'chat-user shadow-sm' : 'chat-ai bg-white border border-gray-100 shadow-sm'} ${extraClass}`; 
            
            // 安全注入逻辑
            if (isSafeHtml) {
                bubble.innerHTML = text; // 此时传入的是我们自己构建的安全 HTML 包含节点
            } else {
                bubble.innerHTML = SecureUtils.escapeHTML(text).replace(/\n/g, '<br>'); 
            }
            
            bubbleWrap.appendChild(bubble);
            chatContainer.appendChild(bubbleWrap); 
            
            setTimeout(() => {
                const mainWorkspace = document.getElementById('mainWorkspace');
                mainWorkspace.scrollTo({ top: mainWorkspace.scrollHeight, behavior: 'smooth' });
            }, 50);
            
            if(save) saveChatToStorage(isUser ? 'user' : 'ai', text, isSafeHtml);
        }

        }

        async function loadStorageData() {
            const savedApiUrl = localStorage.getItem('novacc_apiUrl') || 'https://api.bltcy.ai';
            const savedApiKey = localStorage.getItem('novacc_apiKey');
            const savedGeminiKey = localStorage.getItem('novacc_gemini_apiKey');
            const savedImageFormat = localStorage.getItem('novacc_image_format') || 'auto';
            
            document.getElementById('apiUrl').value = savedApiUrl;
            if(savedApiKey) document.getElementById('apiKey').value = savedApiKey;
            if(savedGeminiKey) document.getElementById('geminiApiKey').value = savedGeminiKey;
            
            document.getElementById('imageFormatSetting').value = savedImageFormat;
            document.querySelectorAll('.format-btn').forEach(btn => {
                if (btn.getAttribute('data-value') === savedImageFormat) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-gray-900');
                    btn.classList.remove('text-gray-500');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-gray-900');
                    btn.classList.add('text-gray-500');
                }
            });

            chatHistory = JSON.parse(localStorage.getItem('novacc_chat_history') || '[]');
            chatHistory.forEach(msg => {
                // 兼容老版本包含富文本缓存的情况，若老缓存带 <img> 标签则视作 HTML
                const isHtml = msg.isSafeHtml !== undefined ? msg.isSafeHtml : (msg.content.includes('<img') || msg.content.includes('<span class="text-red-500"'));
                addChatBubble(msg.content, msg.role === 'user', '', false, isHtml); 
            });

            try {
                flowHistory = await IndexedDBHelper.getAll();
                flowHistory.sort((a, b) => a.timestamp - b.timestamp);
                
                if(flowHistory.length > 0) {
                    const emptyState = document.getElementById('emptyState');
                    if(emptyState) emptyState.remove();
                    for (let i = 0; i < flowHistory.length; i++) {
                        addFlowCard(flowHistory[i].src, false, flowHistory[i].id, flowHistory[i].prompt); 
                    }
                    flowHistory.reverse();
                }
            } catch(e) {
                console.warn('本地图像读取异常');
            }
        }

        function initAllEvents() {
            // 设置项变动同步本地存储
            document.getElementById('apiUrl').addEventListener('input', (e) => localStorage.setItem('novacc_apiUrl', e.target.value));

            document.getElementById('geminiApiKey').addEventListener('input', (e) => localStorage.setItem('novacc_gemini_apiKey', e.target.value));

            // 输入区域高度自动调整
            promptText.addEventListener('input', adjustPromptHeight);
            promptText.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    if (!AppState.isGenerating && !document.getElementById('generateBtn').disabled) {
                        document.getElementById('generateBtn').click();
                    }
                }
            });

            // 本地图片选择
            imageInput.addEventListener('change', (e) => { 
                if (e.target.files && e.target.files.length > 0) { 
                    Array.from(e.target.files).forEach(file => uploadedFiles.push(file));
                    renderPreviews();
                    imageInput.value = ''; 
                } 
            });

            // 拖拽层逻辑管理
            dropZone.addEventListener('dragenter', (e) => { 
                e.preventDefault(); 
                dragCounter++;
                if (dragCounter === 1) {
                    document.getElementById('dropOverlay').classList.remove('hidden'); 
                    document.getElementById('dropOverlay').classList.add('flex'); 
                }
            });
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); });
            dropZone.addEventListener('dragleave', (e) => { 
                e.preventDefault(); 
                dragCounter--;
                if (dragCounter === 0) {
                    document.getElementById('dropOverlay').classList.add('hidden'); 
                    document.getElementById('dropOverlay').classList.remove('flex'); 
                }
            });
            dropZone.addEventListener('drop', (e) => { 
                e.preventDefault(); 
                dragCounter = 0;
                document.getElementById('dropOverlay').classList.add('hidden'); 
                document.getElementById('dropOverlay').classList.remove('flex');
                
                if(e.dataTransfer.files && e.dataTransfer.files.length > 0) { 
                    Array.from(e.dataTransfer.files).forEach(file => uploadedFiles.push(file));
                    renderPreviews();
                } else {
                    const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain'); 
                    if(url && (url.startsWith('data:image') || url.startsWith('http'))) { 
                        srcToFile(url, `dropped_${Date.now()}.png`).then(file => {
                            uploadedFiles.push(file);
                            renderPreviews();
                        }).catch(err => {
                            console.warn("URL转化文件失败", err);
                        });
                    } 
                }
            });

            // 键盘快捷键监听
            document.addEventListener('keydown', (e) => {

                    const activeTag = document.activeElement ? document.activeElement.tagName.toLowerCase() : '';
                    if (activeTag === 'textarea' || activeTag === 'input') return;
                    
                    e.preventDefault();
                    const allCards = document.querySelectorAll('#resultGrid .grid-item');
                    if (allCards.length === 0) return;
                    
                    allCards.forEach(card => {
                        selectedFlowCards.add(card.id);
                        updateCardSelectionUI(card.id, true);

                    updateBatchActionBar();

            });

                const trigger = e.target.closest('.dropdown-trigger'); 
                const item = e.target.closest('.dropdown-item');
                
                if (trigger) { 
                    e.stopPropagation(); 
                    const menu = trigger.closest('.custom-dropdown').querySelector('.dropdown-menu'); 
                    const isHidden = menu.classList.contains('hidden'); 
                    document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.add('hidden')); 
                    if (isHidden) menu.classList.remove('hidden');

            // 批量操作挂载
            document.getElementById('batchCancelBtn').onclick = clearSelection;
            document.getElementById('batchDownloadBtn').onclick = async () => {
                if (typeof JSZip === 'undefined') {
                    showStatus('打包组件尚未加载完成，请稍候再试', true);
                    return;
                }
                const ids = Array.from(selectedFlowCards);
                showStatus(`开始打包 ${ids.length} 张图片...`, false);
                const btn = document.getElementById('batchDownloadBtn');
                const ogHtml = btn.innerHTML;
                btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>打包中...`;
                
                try {
                    const zip = new JSZip();
                    const promises = ids.map(async (id, index) => {
                        const card = document.getElementById(id);
                        if (!card) return;
                        const img = card.querySelector('img');
                        try {
                            const response = await fetch(img.src);
                            const blob = await response.blob();
                            const ext = blob.type.split('/')[1] || 'png';
                            zip.file(`NoVaCc_Artwork_${index + 1}.${ext}`, blob);
                        } catch (e) {
                            console.warn(`Failed to package image ${id}`, e);
                        }
                    });
                    
                    await Promise.all(promises);
                    const content = await zip.generateAsync({ type: "blob" });
                    const url = window.URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = `NoVaCc_Batch_Artworks_${Date.now()}.zip`;
                    document.body.appendChild(a);
                    a.click();

                    document.body.removeChild(a);
                    
                    showStatus('批量打包下载完成');
                } catch (err) {
                    showStatus('打包下载失败，请检查网络状态', true);

                    clearSelection();

                    this.classList.replace('text-red-500', 'text-white');

                        this.classList.replace('text-white', 'text-red-500');

                    this.classList.replace('text-white', 'text-red-500');
                    this.classList.replace('bg-red-500', 'bg-red-50');

            // 模型同步拉取
            document.getElementById('syncModelsBtn').onclick = async () => {
                const apiKey = document.getElementById('apiKey').value.trim(); 
                const baseUrl = document.getElementById('apiUrl').value.trim().replace(/\/+$/, '');
                const btn = document.getElementById('syncModelsBtn'); 
                if(!apiKey) { showStatus('请配置主力 API Key', true); return; }
                
                btn.innerHTML = `同步检索中...`; 
                btn.disabled = true;
                
                try {
                    const res = await fetch(`${baseUrl}/v1/models`, { headers: { 'Authorization': `Bearer ${apiKey}` }});
                    if(!res.ok) throw new Error(`HTTP Error ${res.status}`);
                    const data = await res.json(); 
                    
                    const modelsArray = Array.isArray(data) ? data : (data.data || []);
                    const fetchedIds = new Set(modelsArray.map(m => m.id));
                    MODEL_MATRIX = JSON.parse(INITIAL_MATRIX_BLUEPRINT);
                    
                    for (let type in MODEL_MATRIX) { 
                        MODEL_MATRIX[type].forEach(p => { p.models = p.models.filter(m => fetchedIds.has(m.id)); }); 
                        MODEL_MATRIX[type] = MODEL_MATRIX[type].filter(p => p.models.length > 0); 
                    }
                    
                    modelsArray.forEach(m => {
                        const id = (m.id || '').toLowerCase();
                        if(!id.includes('gpt') && !id.includes('dall-e') && !id.includes('o1') && !id.includes('o3') && !id.includes('o4')) return;

                        let exists = false; 
                        for (let t in MODEL_MATRIX) { for (let p of MODEL_MATRIX[t]) { if (p.models.some(mod => mod.id === m.id)) exists = true; } }
                        if(exists) return;
                        
                        let type = 'text';
                        if(id.includes('image') || id.includes('dall-e')) { type = 'image'; }
                        
                        let pEntry = MODEL_MATRIX[type].find(p => p.provider === 'OpenAI 扩展同步模型');
                        if(!pEntry) { pEntry = { provider: 'OpenAI 扩展同步模型', pop: 100, models: [] }; MODEL_MATRIX[type].push(pEntry); }
                        pEntry.models.push({ id: m.id, name: m.id, icon: Logos.general, desc: '已同步智能接口模型', multiplier: m.multiplier || m.price || null });
                    });
                    
                    if(document.getElementById('modelModal').classList.contains('flex')) renderModelList(AppState.currentMode);
                    showStatus(`同步成功！已剔除所有非 OpenAI 官方的模型。`);

                    showStatus(`同步失败: 请检查接口地址或网络`, true); 
                } finally { 
                    btn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>同步 OpenAI 模型`;

                    try {
                        const file = await srcToFile(imgSrc, `remix_${Date.now()}.png`);
                        uploadedFiles.push(file); 
                        renderPreviews();
                        showStatus('已载入该图片及提示词，可二次生成/重绘', false);
                        promptText.focus();
                    } catch(err) {
                        showStatus('由于跨域安全限制，提取原图数据失败，请手动保存后上传垫图', true);
                    } finally {
                        remixBtn.innerHTML = ogHtml;

                }

                const downloadBtn = e.target.closest('.download-btn');
                if (downloadBtn) {

                    const imgSrc = card.querySelector('img').src;
                    const ogHtml = downloadBtn.innerHTML;
                    downloadBtn.innerHTML = `<svg class="w-4 h-4 animate-spin text-mi-orange" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
                    try {
                        const response = await fetch(imgSrc);
                        if (!response.ok) throw new Error('网络响应异常');
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = `NoVaCc_Artwork_${Date.now()}.png`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        document.body.removeChild(a);
                    } catch (err) {
                        const a = document.createElement('a');
                        a.href = imgSrc;
                        a.target = '_blank';
                        a.download = `NoVaCc_Artwork_${Date.now()}.png`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    } finally {
                        downloadBtn.innerHTML = ogHtml;
                    }
                    return;
                }

                const deleteBtn = e.target.closest('.delete-btn');
                if (deleteBtn) {
                    e.stopPropagation();
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                    setTimeout(() => {
                        card.remove();
                        removeFlowFromStorage(cardId);
                    }, 300);
                    return;
                }
            });

            // 润色请求逻辑
            document.getElementById('enhanceBtn').onclick = async () => {
                if (AppState.isGenerating) return;
                
                // 模块 3 优化：强制从设置面板中获取独立配置好的 Gemini API 凭证
                const geminiKey = document.getElementById('geminiApiKey').value.trim();
                if (!geminiKey) {
                    showStatus('请先在全局设置中配置 Gemini 凭证以开启魔法扩写', true);
                    openModal('settingsModal');
                    return;
                }

                const originalPrompt = promptText.value.trim();
                if (!originalPrompt) {
                    showStatus('请先输入简单的灵感短句，再使用 ✨ 魔法扩写', true);
                    promptText.focus();
                    return;
                }
                
                const enhanceBtn = document.getElementById('enhanceBtn');
                enhanceBtn.disabled = true;
                promptText.disabled = true;
                enhanceBtn.classList.add('opacity-50', 'animate-pulse');
                
                const payload = {
                    contents: [{ parts: [{ text: `你是一个专业的 AI 提示词工程师/艺术总监。请将以下简短的提示词智能扩写为画面丰富、细节详尽、具有专业摄影或绘画风格描述的高级提示词（如果原句是中文请输出中文）。直接输出扩写后的结果，绝对不要包含任何解释性的废话。\n\n原始灵感：${originalPrompt}` }] }],
                    systemInstruction: { parts: [{ text: "You are an expert AI prompt engineer." }] }
                };

                let delay = 1000;
                let success = false;
                let responseData = null;

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (response.ok) {
                            responseData = await response.json();
                            success = true;
                            break;
                        } else if (response.status !== 429 && response.status < 500) {
                            throw new Error(`HTTP error ${response.status}`);
                        }
                    } catch (e) {
                        if (i === 4) {
                            showStatus('✨ 扩写魔法服务暂时繁忙，请检查网络或稍后再试', true);
                        }
                    }
                    if (!success) {
                        await new Promise(res => setTimeout(res, delay));
                        delay *= 2;
                    }
                }
                
                if (success && responseData) {
                    const enhancedText = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (enhancedText) {
                        promptText.value = enhancedText.trim();
                        adjustPromptHeight();
                        showStatus('✨ 已通过 Gemini 完成智能润色扩写');
                    }
                }
                
                enhanceBtn.disabled = false;
                promptText.disabled = false;
                promptText.focus();
                enhanceBtn.classList.remove('opacity-50', 'animate-pulse');
            };

            // 核心生成逻辑
            document.getElementById('generateBtn').onclick = async () => {
                if (AppState.isGenerating) return;

                const apiKey = document.getElementById('apiKey').value.trim(); 
                const prompt = promptText.value.trim(); 
                const baseUrl = document.getElementById('apiUrl').value.trim().replace(/\/+$/, '');
                const currentPromptForSave = prompt; 

                if (!apiKey) { showStatus('请配置主力 API Key', true); openModal('settingsModal'); return; }
                if (!prompt && uploadedFiles.length === 0) { promptText.focus(); return; }
                
                AppState.isGenerating = true; 
                const btn = document.getElementById('generateBtn'); 
                btn.disabled = true; 
                promptText.disabled = true; 
                btn.innerHTML = `<svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`; 
                
                promptText.value = ''; 
                adjustPromptHeight();
                
                let base64Images = [];
                if (uploadedFiles.length > 0) {
                    for (let file of uploadedFiles) {
                        base64Images.push(await fileToBase64(file));
                    }
                }

                uploadedFiles = [];
                renderPreviews();
                
                try {
                    if (AppState.currentMode === 'text') {
                        let userBubbleHtml = '';
                        let isHtmlContent = false;
                        if (base64Images.length > 0) {
                            const imgHtml = base64Images.map(b64 => `<img src="${b64}" class="max-w-[120px] rounded-xl mb-2 border border-gray-200 shadow-sm inline-block mr-2">`).join('');
                            // 模块 3 优化：分离结构保证图片节点正常渲染的同时将输入文本严密转义防注入
                            userBubbleHtml = `<div>${imgHtml}</div><p class="whitespace-pre-wrap">${SecureUtils.escapeHTML(prompt)}</p>`;
                            isHtmlContent = true;
                        } else {
                            userBubbleHtml = prompt;
                        }
                        
                        addChatBubble(userBubbleHtml, true, '', true, isHtmlContent);
                        addChatBubble("云端思考中...", false, 'loading-bubble', false, false);
                        
                        let messageContent = prompt;
                        if (base64Images.length > 0) {
                            messageContent = [];
                            if (prompt) messageContent.push({ type: "text", text: prompt });
                            base64Images.forEach(b64 => {
                                messageContent.push({ type: "image_url", image_url: { url: b64 } });
                            });
                        }
                        
                        const res = await fetch(`${baseUrl}/v1/chat/completions`, { 
                            method: 'POST', 
                            headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({ model: AppState.currentModelId, messages: [{ role: 'user', content: messageContent }] }) 
                        });
                        if(!res.ok) throw new Error(`HTTP Error ${res.status}`);
                        const data = await res.json(); 
                        
                        const finalContent = data.choices[0].message.content;
                        const loadingBubble = document.getElementById('chatContainer').querySelector('.loading-bubble');
                        
                        // 模块 3 优化：强制对大模型返回数据洗脱标签转义
                        loadingBubble.innerHTML = SecureUtils.escapeHTML(finalContent).replace(/\n/g, '<br>');
                        loadingBubble.classList.remove('loading-bubble');
                        
                        saveChatToStorage('ai', finalContent, false);
                        
                    } else if (AppState.currentMode === 'image') {
                        const emptyState = document.getElementById('emptyState');
                        if(emptyState) emptyState.remove();
                        
                        const n = parseInt(document.getElementById('dynamicCount').value);
                        const size = document.getElementById('dynamicSize').value; 
                        const settingFormat = document.getElementById('imageFormatSetting').value || 'auto';
                        const actualFormat = settingFormat === 'auto' ? 'url' : settingFormat;
                        
                        showStatus(`正在调度 ${n} 张图像生成任务...`, false);
                        
                        const requests = [];
                        for (let i = 0; i < n; i++) {
                            const skelId = 'skeleton-' + Date.now() + '-' + i;
                            const skeletonCard = document.createElement('div');
                            skeletonCard.id = skelId;
                            skeletonCard.className = 'grid-item aspect-square bg-white p-2 rounded-[24px] shadow-sm border border-gray-100 relative overflow-hidden animate-pulse flex flex-col items-center justify-center bg-gray-50/50';
                            skeletonCard.innerHTML = `<div class="flex flex-col items-center justify-center opacity-60"><svg class="w-8 h-8 text-mi-orange animate-spin mb-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg><span class="text-[13px] font-medium text-gray-500 tracking-wider">神经渲染中...</span></div>`;
                            document.getElementById('resultGrid').insertBefore(skeletonCard, document.getElementById('resultGrid').firstChild);
                            
                            let opt = { method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' } };
                            
                            let payload = { 
                                prompt: prompt || 'A beautiful artwork', 
                                model: AppState.currentModelId, 
                                size: size, 
                                n: 1,
                                response_format: actualFormat
                            };

                            if (base64Images.length > 0) {
                                payload.image = base64Images;
                            }

                            opt.body = JSON.stringify(payload);
                            
                            const reqPromise = fetch(`${baseUrl}/v1/images/generations`, opt)
                                .then(async res => {
                                    if(!res.ok) {
                                        const errData = await res.json().catch(()=>({}));
                                        throw new Error(errData.error?.message || `HTTP状态码异常 ${res.status}`);
                                    }
                                    return res.json();
                                })
                                .then(data => {
                                    const skel = document.getElementById(skelId);
                                    if(skel) skel.remove();
                                    
                                    let imageList = [];
                                    if (data && data.images && Array.isArray(data.images)) {
                                        imageList = data.images;
                                    } else if (data && data.data && Array.isArray(data.data)) {
                                        imageList = data.data;
                                    }
                                    
                                    if(imageList && imageList.length > 0) {
                                        imageList.forEach(item => {
                                            let finalSrc = '';
                                            if (typeof item === 'string') {
                                                finalSrc = (item.startsWith('http') || item.startsWith('data:image')) ? item : `data:image/png;base64,${item}`;
                                            } else if (typeof item === 'object') {
                                                finalSrc = item.url || (item.b64_json ? `data:image/png;base64,${item.b64_json}` : '');
                                            }
                                            
                                            if (finalSrc) {
                                                addFlowCard(finalSrc, true, null, currentPromptForSave); 
                                            }
                                        });
                                    } else {
                                        throw new Error("接口成功响应，但未包含有效图像数据");
                                    }
                                })
                                .catch(err => {
                                    const skel = document.getElementById(skelId);
                                    if(skel) {
                                        skel.classList.remove('animate-pulse');
                                        const errorTip = base64Images.length > 0 && err.message.includes('Unrecognized request argument') ? '此模型不支持参考垫图' : err.message;
                                        // 这里生成的属于内部错误拦截数据可信任
                                        skel.innerHTML = `<div class="flex flex-col items-center justify-center opacity-80 text-red-500 p-4 text-center"><svg class="w-8 h-8 mb-3 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg><span class="text-[13px] font-bold">生成失败</span><span class="text-[11px] mt-1.5 text-gray-500 break-all line-clamp-3">${SecureUtils.escapeHTML(errorTip)}</span></div>`;
                                        setTimeout(() => skel.remove(), 4000); 
                                    }
                                    throw err;
                                });
                            
                            requests.push(reqPromise);
                        }
                        
                        const results = await Promise.allSettled(requests);
                        const rejectedCount = results.filter(r => r.status === 'rejected').length;
                        
                        if (rejectedCount === n) {
                            throw new Error("图像生成请求失败，请检查提示词或接口响应");
                        } else if (rejectedCount > 0) {
                            showStatus(`生成完成 (成功 ${n - rejectedCount} / 失败 ${rejectedCount})`, false);
                        } else {
                            showStatus('图像全部生成成功！');
                        }
                    }
                } catch (err) { 
                    if(AppState.currentMode === 'text') {
                        const loadingBubble = document.getElementById('chatContainer').querySelector('.loading-bubble');
                        if(loadingBubble) {
                            // 错误内容输出洗脱
                            loadingBubble.innerHTML = `<span class="text-red-500 font-medium">❌ 异常: ${SecureUtils.escapeHTML(err.message)}</span>`;
                            loadingBubble.classList.remove('loading-bubble');
                        }
                    } else {
                        showStatus(`系统调度提示: ${err.message}`, true); 
                    }
                } finally { 
                    btn.disabled = false; 
                    promptText.disabled = false;
                    promptText.focus();
                    btn.innerHTML = `<svg class="w-4 h-4 translate-x-[1px] -translate-y-[1px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 19V5M5 12l7-7 7 7"></path></svg>`; 
                    AppState.isGenerating = false; 
                }
            };
        }

        /* === 5. 初始调度与引导面板逻辑 === */
        const OnboardingConfig = [
            { title: "探索 NoVaCc 创作边界", desc: "提供极简、无缝的沉浸式GPT image 2 的创作体验。", svg: `<svg viewBox="0 0 200 200" class="w-40 h-40 animate-float-slow"><defs><radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FF6700" stop-opacity="0.4"/><stop offset="100%" stop-color="#FF6700" stop-opacity="0"/></radialGradient><linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#FF6700"/><stop offset="100%" stop-color="#FF3300"/></linearGradient></defs><circle cx="100" cy="100" r="80" fill="url(#glow)"/><path d="M60 100 L100 60 L140 100 L100 140 Z" fill="url(#core)" opacity="0.9" class="transform origin-center transition-transform hover:scale-110"/><circle cx="60" cy="100" r="6" fill="#333"/><circle cx="140" cy="100" r="6" fill="#333"/><circle cx="100" cy="60" r="6" fill="#333"/><circle cx="100" cy="140" r="6" fill="#333"/><path d="M60 100 L140 100 M100 60 L100 140" stroke="#FFF" stroke-width="2" stroke-dasharray="4 4" opacity="0.5"/></svg>` },
            { title: "云端模型矩阵同步", desc: "只需在全局设置中配置您的专属 API 凭证，即可一键拉取并同步你可使用的OPAI大模型生态矩阵。", svg: `<svg viewBox="0 0 200 200" class="w-40 h-40 animate-float-slow" style="animation-delay: 0.5s;"><defs><linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#4F46E5"/><stop offset="100%" stop-color="#3B82F6"/></linearGradient></defs><path d="M145 90 C145 65 125 45 100 45 C80 45 63 58 57 76 C40 78 28 92 28 110 C28 130 44 146 64 146 L136 146 C155 146 170 131 170 112 C170 95 158 80 145 76 Z" fill="url(#cloudGrad)" opacity="0.15"/><path d="M140 95 C140 75 124 59 104 59 C88 59 74 69 69 84 C56 86 46 97 46 111 C46 127 59 140 75 140 L133 140 C148 140 160 128 160 113 C160 99 150 87 140 84 Z" fill="url(#cloudGrad)"/><circle cx="104" cy="100" r="24" fill="#FFF" shadow="0 4px 10px rgba(0,0,0,0.1)"/><path d="M96 96 L104 104 L114 90" stroke="#3B82F6" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M60 160 L140 160" stroke="#93C5FD" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 10"/></svg>` },
            { title: "全维度的生成引擎", desc: "系统内置智能分类算法，自动将数以百计的模型精准划分为文本对话与图像生成两大专区。", svg: `<svg viewBox="0 0 200 200" class="w-40 h-40 animate-float-slow" style="animation-delay: 1s;"><rect x="30" y="50" width="140" height="30" rx="8" fill="#F3F4F6" opacity="0.8"/><rect x="40" y="60" width="80" height="10" rx="4" fill="#D1D5DB"/><rect x="20" y="90" width="160" height="40" rx="10" fill="#FFF" stroke="#E5E7EB" stroke-width="2"/><circle cx="45" cy="110" r="8" fill="#FF6700"/><rect x="65" y="105" width="90" height="10" rx="4" fill="#FF6700" opacity="0.3"/><rect x="30" y="140" width="140" height="30" rx="8" fill="#F3F4F6" opacity="0.8"/><rect x="40" y="150" width="60" height="10" rx="4" fill="#D1D5DB"/></svg>` },
            { title: "直觉式的跨界流转", desc: "打破介质壁垒。您可以将画板中的视觉灵感直接拖拽至输入域，即刻开启多模态的二次延展创作。", svg: `<svg viewBox="0 0 200 200" class="w-40 h-40 animate-float-slow" style="animation-delay: 1.5s;"><rect x="50" y="30" width="100" height="70" rx="12" fill="#E5E7EB"/><circle cx="100" cy="65" r="16" fill="#FFF" opacity="0.5"/><path d="M85 75 L100 55 L115 75 Z" fill="#9CA3AF"/><path d="M100 110 C 100 130, 70 140, 70 160" fill="none" stroke="#FF6700" stroke-width="4" stroke-dasharray="6 6" class="animate-pulse"/><polygon points="65,155 75,155 70,165" fill="#FF6700"/><rect x="40" y="160" width="120" height="20" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="2"/></svg>` }
        ];

        let currentStep = 0; 
        const obOverlay = document.getElementById('onboardingOverlay'); 
        const obCard = document.getElementById('onboardingCard');
        
        function renderObStep(idx) {
            const data = OnboardingConfig[idx]; 
            document.getElementById('obTitle').textContent = data.title; 
            document.getElementById('obDesc').textContent = data.desc; 
            
            const illContainer = document.getElementById('obIllustration');
            illContainer.classList.add('opacity-0', 'translate-y-4');
            
            setTimeout(() => {
                illContainer.innerHTML = data.svg;
                illContainer.classList.remove('opacity-0', 'translate-y-4');
            }, 200);

            document.getElementById('obDots').innerHTML = OnboardingConfig.map((_, i) => `<div class="w-2 h-2 rounded-full transition-all duration-300 ${i === idx ? 'bg-mi-orange w-6' : 'bg-gray-200'}"></div>`).join('');
            document.getElementById('obPrevBtn').disabled = idx === 0; 
            document.getElementById('obNextText').textContent = idx === OnboardingConfig.length-1 ? "开始创作" : "下一页";
            if (idx === OnboardingConfig.length-1) document.getElementById('obNextIcon').classList.add('hidden');
            else document.getElementById('obNextIcon').classList.remove('hidden');
        }
        
        document.getElementById('obNextBtn').onclick = () => { 
            if(currentStep < OnboardingConfig.length-1) renderObStep(++currentStep); 
            else { 
                localStorage.setItem('novacc_onboarding_completed', 'true'); 
                obOverlay.classList.remove('opacity-100');
                obOverlay.classList.add('opacity-0');
                setTimeout(() => obOverlay.classList.add('hidden'), 500);
            } 
        };
        
        document.getElementById('obPrevBtn').onclick = () => { if(currentStep > 0) renderObStep(--currentStep); };
        document.getElementById('obSkipBtn').onclick = () => { 
            localStorage.setItem('novacc_onboarding_completed', 'true'); 
            obOverlay.classList.remove('opacity-100');
            obOverlay.classList.add('opacity-0');
            setTimeout(() => obOverlay.classList.add('hidden'), 500); 
        };
        
        // 核心启动入口
        window.addEventListener('DOMContentLoaded', async () => {
            selectModel('text', MODEL_MATRIX['text'][0].models[0]);
            
            initAllEvents(); 

            await IndexedDBHelper.init().catch(console.warn);
            await loadStorageData(); 

            if(!localStorage.getItem('novacc_onboarding_completed')) { 
                obOverlay.classList.remove('hidden'); 
                obOverlay.classList.add('flex'); 
                setTimeout(() => { 
                    obOverlay.classList.remove('opacity-0');
                    obOverlay.classList.add('opacity-100');
                    document.getElementById('obBackdrop').classList.add('opacity-100'); 
                    obCard.classList.remove('scale-95','opacity-0'); 
                    obCard.classList.add('scale-100','opacity-100'); 
                    renderObStep(0); 
                }, 50); 
            } 
        });
    </script>
</body>
</html>
